image:
  tag: latest
  pullPolicy: IfNotPresent

config:
  environment: local
  otelExporter: console
  otelOtlpEndpoint: ""
  autoCreateSchema: true

worker:
  enabled: true

secrets:
  create: true
  databaseUrl: postgresql+asyncpg://app:app@llm-evaluation-service-postgres:5432/llm_evaluations
  postgresPassword: app

postgresDemo:
  enabled: true

migrations:
  enabled: false

ingress:
  enabled: false

console:
  enabled: true
  image:
    tag: latest
    pullPolicy: IfNotPresent
  config:
    apiBaseUrl: ""
  ingress:
    enabled: false
