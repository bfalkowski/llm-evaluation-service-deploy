image:
  tag: latest
  pullPolicy: IfNotPresent

config:
  environment: local
  otelExporter: console
  otelOtlpEndpoint: ""
  autoCreateSchema: false

secrets:
  create: true
  databaseUrl: postgresql+asyncpg://app:app@llm-evaluation-service-postgres:5432/llm_evaluations
  postgresPassword: app

postgresDemo:
  enabled: true

migrations:
  enabled: true

ingress:
  enabled: false
