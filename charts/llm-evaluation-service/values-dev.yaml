image:
  tag: replace-with-full-commit-sha
  pullPolicy: IfNotPresent

config:
  environment: dev
  otelExporter: otlp
  otelOtlpEndpoint: http://otel-collector:4317
  autoCreateSchema: false
  authEnabled: true

worker:
  enabled: true

secrets:
  create: false
  existingSecretName: llm-evaluation-service-secrets

postgresDemo:
  enabled: false

migrations:
  enabled: true

ingress:
  enabled: false

console:
  enabled: true
  image:
    tag: latest
    pullPolicy: IfNotPresent
  config:
    apiBaseUrl: ""
  ingress:
    enabled: false
