{{- if .Values.postgresDemo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-evaluation-service.postgresName" . }}
  labels:
    {{- include "llm-evaluation-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresDemo.image | quote }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresDemo.service.port }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresDemo.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresDemo.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-evaluation-service.secretName" . }}
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresDemo.username | quote }}
                - -d
                - {{ .Values.postgresDemo.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-evaluation-service.postgresName" . }}
  labels:
    {{- include "llm-evaluation-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: {{ .Values.postgresDemo.service.port }}
      targetPort: postgres
{{- end }}
