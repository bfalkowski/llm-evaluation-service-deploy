{{- if .Values.console.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-evaluation-service.consoleName" . }}
  labels:
    {{- include "llm-evaluation-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  type: {{ .Values.console.service.type }}
  selector:
    {{- include "llm-evaluation-service.consoleSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: http
{{- end }}
