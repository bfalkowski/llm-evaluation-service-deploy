{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-evaluation-service.secretName" . }}
  labels:
    {{- include "llm-evaluation-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_DATABASE_URL: {{ required "secrets.databaseUrl is required when secrets.create=true" .Values.secrets.databaseUrl | quote }}
  {{- if .Values.postgresDemo.enabled }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when postgresDemo.enabled=true" .Values.secrets.postgresPassword | quote }}
  {{- end }}
{{- end }}
