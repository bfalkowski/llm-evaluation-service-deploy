{{- if and .Values.console.enabled .Values.console.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llm-evaluation-service.consoleName" . }}
  labels:
    {{- include "llm-evaluation-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
  {{- with .Values.console.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.console.ingress.className }}
  ingressClassName: {{ .Values.console.ingress.className | quote }}
  {{- end }}
  {{- if .Values.console.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "console.ingress.host is required when console.ingress.tls.enabled=true" .Values.console.ingress.host | quote }}
      secretName: {{ required "console.ingress.tls.secretName is required when console.ingress.tls.enabled=true" .Values.console.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ required "console.ingress.host is required when console.ingress.enabled=true" .Values.console.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llm-evaluation-service.consoleName" . }}
                port:
                  name: http
{{- end }}
