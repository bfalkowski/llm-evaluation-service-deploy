apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-evaluation-service.fullname" . }}-config
  labels:
    {{- include "llm-evaluation-service.labels" . | nindent 4 }}
data:
  APP_ENVIRONMENT: {{ .Values.config.environment | quote }}
  APP_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  APP_OTEL_ENABLED: {{ .Values.config.otelEnabled | quote }}
  APP_OTEL_EXPORTER: {{ .Values.config.otelExporter | quote }}
  APP_OTEL_OTLP_ENDPOINT: {{ .Values.config.otelOtlpEndpoint | quote }}
  APP_STORAGE_BACKEND: {{ .Values.config.storageBackend | quote }}
