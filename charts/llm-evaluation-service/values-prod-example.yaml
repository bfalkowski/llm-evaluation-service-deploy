replicaCount: 2

image:
  tag: replace-with-full-commit-sha
  pullPolicy: IfNotPresent

config:
  environment: production
  otelExporter: otlp
  otelOtlpEndpoint: http://otel-collector:4317
  autoCreateSchema: false

secrets:
  create: false
  existingSecretName: llm-evaluation-service-secrets

postgresDemo:
  enabled: false

migrations:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: llm-evaluation.example.com
  tls:
    enabled: true
    secretName: llm-evaluation-service-tls

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
