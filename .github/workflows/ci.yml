name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  helm:
    name: Helm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: 0.7.0

      - name: Lint chart
        run: helm lint charts/llm-evaluation-service

      - name: Render local values
        run: |
          helm template llm-evaluation-service \
            charts/llm-evaluation-service \
            -f charts/llm-evaluation-service/values-local.yaml \
            > rendered-local.yaml

      - name: Render dev values
        run: |
          helm template llm-evaluation-service \
            charts/llm-evaluation-service \
            -f charts/llm-evaluation-service/values-dev.yaml \
            > rendered-dev.yaml

      - name: Render prod example values
        run: |
          helm template llm-evaluation-service \
            charts/llm-evaluation-service \
            -f charts/llm-evaluation-service/values-prod-example.yaml \
            > rendered-prod-example.yaml

      - name: Validate rendered manifests
        run: kubeconform -strict rendered-local.yaml rendered-dev.yaml rendered-prod-example.yaml
